services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - path: ./api/.env
        required: false
    environment:
      # Allow the UI container's origin through CORS.
      - UI_BASE_URL=http://localhost:5173

  ui:
    build:
      context: ./ui
      args:
        # Baked into the static bundle; the browser calls the API directly.
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api
